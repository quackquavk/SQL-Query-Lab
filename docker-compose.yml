version: '3.9'

services:
  api:
    build: .
    ports:
      - '3000:3000'
    restart: unless-stopped
    env_file: backend/.env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s